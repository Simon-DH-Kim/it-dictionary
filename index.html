<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT 용어 사전 / IT Dictionary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg: #F5F4F0;
  --surface: #FFFFFF;
  --ink: #1C1C1C;
  --ink-muted: #6B6B6B;
  --accent: #2A54D4;
  --accent-soft: #EBF0FD;
  --accent-hover: #1E3FA8;
  --border: #E2DED6;
  --success: #1E9E6A;
  --success-soft: #E6F6F1;
  --warn: #C98A00;
  --warn-soft: #FFF8E6;
  --tag-bg: #EDEAE4;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── API 키 화면 ── */
#apiScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.api-card {
  background: var(--surface);
  border-radius: 20px;
  padding: 40px;
  max-width: 480px;
  width: 100%;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.api-icon { font-size: 44px; margin-bottom: 16px; text-align: center; }

.api-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  text-align: center;
  margin-bottom: 6px;
}

.api-sub {
  font-size: 13px;
  color: var(--ink-muted);
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.65;
}

.api-steps {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.8;
}

.api-steps a { color: var(--accent); text-decoration: none; }
.api-steps a:hover { text-decoration: underline; }

.api-input-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.api-input-wrap input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 14px;
  font-family: monospace;
  outline: none;
  transition: border-color 0.2s;
  background: var(--surface);
}

.api-input-wrap input:focus { border-color: var(--accent); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 11px 20px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}

.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

.api-note {
  font-size: 12px;
  color: var(--ink-muted);
  text-align: center;
}

/* ── 메인 앱 ── */
#appScreen { display: none; }

/* ── 헤더 ── */
header {
  background: var(--ink);
  color: #fff;
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header-sub {
  font-size: 12px;
  color: #888;
  display: none;
}

@media (min-width: 600px) { .header-sub { display: block; } }

/* 언어 토글 */
.lang-toggle {
  display: flex;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: hidden;
}

.lang-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: #aaa;
  font-family: inherit;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ── 메인 콘텐츠 ── */
.main {
  max-width: 860px;
  margin: 0 auto;
  padding: 28px 20px 80px;
}

/* ── 검색창 ── */
.search-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
  transition: border-color 0.2s;
  box-shadow: var(--shadow);
}

.search-box:focus-within { border-color: var(--accent); }

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 15px;
  background: transparent;
  color: var(--ink);
  min-width: 0;
}

.search-box input::placeholder { color: #C0BAB0; }

/* ── 섹션 레이블 ── */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
}

/* ── 빠른 선택 ── */
.quick-section { margin-bottom: 20px; }

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  color: var(--ink-muted);
  transition: all 0.15s;
  font-family: inherit;
}

.chip:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── 카테고리 ── */
.category-section { margin-bottom: 28px; }

.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

@media (min-width: 600px) {
  .category-grid { grid-template-columns: repeat(3, 1fr); }
}

.cat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}

.cat-card:hover, .cat-card.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.cat-icon { font-size: 20px; flex-shrink: 0; }

.cat-info { min-width: 0; }

.cat-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 1px;
}

.cat-card.active .cat-name { color: var(--accent); }

.cat-desc {
  font-size: 10px;
  color: var(--ink-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 용어 목록 패널 */
.term-panel {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-top: 8px;
}

.term-panel.visible { display: block; }

.term-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.term-panel-title { font-size: 13px; font-weight: 700; }

.term-panel-close {
  cursor: pointer;
  color: var(--ink-muted);
  font-size: 18px;
  line-height: 1;
  padding: 0 4px;
}

.term-list {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.term-item {
  background: var(--tag-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 13px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.15s;
  font-family: inherit;
}

.term-item:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── 로딩 ── */
.loading {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 16px 0;
  color: var(--ink-muted);
  font-size: 13px;
}

.loading.visible { display: flex; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── 에러 ── */
.error-box {
  display: none;
  background: #FFF0F0;
  border: 1px solid #FFCDD2;
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  font-size: 13px;
  color: #B71C1C;
  margin-bottom: 16px;
}

.error-box.visible { display: block; }

/* ── 결과 ── */
.result { display: none; flex-direction: column; gap: 18px; }
.result.visible { display: flex; }

/* ── 카드 공통 ── */
.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 22px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

/* ── 용어 카드 ── */
.term-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.term-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.2;
}

.difficulty-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

.diff-beginner { background: var(--success-soft); color: var(--success); }
.diff-intermediate { background: var(--warn-soft); color: var(--warn); }
.diff-advanced { background: #FEE8E8; color: #C0392B; }

.term-sub {
  font-size: 13px;
  color: var(--ink-muted);
  margin-bottom: 16px;
}

.definition {
  font-size: 15px;
  line-height: 1.78;
  color: #333;
  margin-bottom: 16px;
}

.analogy-box {
  background: var(--warn-soft);
  border-left: 4px solid var(--warn);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 14px 18px;
}

.analogy-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--warn);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.analogy-text {
  font-size: 13px;
  color: #555;
  line-height: 1.65;
}

/* ── 사례 카드 ── */
.examples-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

@media (min-width: 600px) {
  .examples-grid { grid-template-columns: repeat(3, 1fr); }
}

.example-item {
  background: var(--accent-soft);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}

.ex-icon { font-size: 22px; margin-bottom: 8px; }
.ex-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.ex-desc { font-size: 12px; color: #444; line-height: 1.55; }

/* ── 직군별 활용 ── */
.job-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.job-item {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  background: var(--bg);
}

.job-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.job-icon { font-size: 18px; }
.job-role { font-size: 13px; font-weight: 700; color: var(--ink); }

.job-benefit {
  font-size: 12px;
  color: var(--success);
  font-weight: 600;
  margin-bottom: 4px;
}

.job-use { font-size: 12px; color: var(--ink-muted); line-height: 1.55; }

/* ── 온톨로지 그래프 ── */
#graphContainer {
  width: 100%;
  height: 300px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

#graphCanvas {
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.graph-hint {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 8px;
}

/* ── 혼동 표 ── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.compare-table th {
  background: var(--ink);
  color: #fff;
  padding: 9px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.compare-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.55;
}

.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:nth-child(even) td { background: var(--bg); }

/* ── 연관 태그 ── */
.related-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.related-tag {
  background: var(--tag-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 13px;
  font-size: 13px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.15s;
  font-family: inherit;
}

.related-tag:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── 히스토리 ── */
.history-section {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.history-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }

.history-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  color: var(--ink-muted);
  font-family: inherit;
  transition: color 0.15s;
}

.history-chip:hover { color: var(--accent); }

/* ── API 키 변경 버튼 ── */
.reset-btn {
  background: transparent;
  border: none;
  font-size: 11px;
  color: #666;
  cursor: pointer;
  font-family: inherit;
  padding: 0;
  text-decoration: underline;
}

.reset-btn:hover { color: var(--accent); }
</style>
</head>
<body>

<!-- ══ API 키 입력 화면 ══════════════════════════════════ -->
<div id="apiScreen">
  <div class="api-card">
    <div class="api-icon">📚</div>
    <div class="api-title" id="apiTitle">IT 용어 사전 시작하기</div>
    <div class="api-sub" id="apiSub">무료 Gemini API 키를 입력하면 바로 사용할 수 있어요.<br>한 번만 입력하면 이후엔 자동으로 연결돼요.</div>

    <div class="api-steps" id="apiSteps">
      1. <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> 접속<br>
      2. Google 계정으로 로그인<br>
      3. 왼쪽 메뉴 "Get API key" → "Create API key" 클릭<br>
      4. 생성된 키를 아래에 붙여넣기
    </div>

    <div class="api-input-wrap">
      <input type="password" id="apiKeyInput" placeholder="API 키를 붙여넣으세요..." autocomplete="off" />
      <button class="btn-primary" onclick="saveApiKey()" id="apiSaveBtn">저장</button>
    </div>
    <div class="api-note" id="apiNote">무료 · 신용카드 불필요 · 하루 1,500회 제공</div>

    <!-- 언어 선택 -->
    <div style="display:flex;justify-content:center;margin-top:20px;gap:8px;">
      <button class="lang-btn active" id="setupLangKo" onclick="setLang('ko')" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">한국어</button>
      <button class="lang-btn" id="setupLangEn" onclick="setLang('en')" style="background:var(--tag-bg);color:var(--ink-muted);border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">English</button>
    </div>
  </div>
</div>

<!-- ══ 메인 앱 ══════════════════════════════════════════ -->
<div id="appScreen">

  <!-- 헤더 -->
  <header>
    <div class="header-left">
      <span class="header-title" id="headerTitle">📚 IT 용어 사전</span>
      <span class="header-sub" id="headerSub">비IT 사람을 위한 온톨로지 사전</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="reset-btn" id="resetBtn" onclick="resetApiKey()">API 키 변경</button>
      <div class="lang-toggle">
        <button class="lang-btn active" id="langKo" onclick="setLang('ko')">KO</button>
        <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <div class="main">

    <!-- 검색창 -->
    <div class="search-box">
      <input type="text" id="termInput" placeholder="궁금한 IT 용어를 입력하세요  예: API, 클라우드, 머신러닝..." />
      <button class="btn-primary" id="searchBtn" onclick="search()">설명해줘 →</button>
    </div>

    <!-- 빠른 선택 -->
    <div class="quick-section">
      <div class="section-label" id="quickLabel">빠른 선택 · 예시</div>
      <div class="chips" id="quickChips"></div>
    </div>

    <!-- 카테고리 -->
    <div class="category-section">
      <div class="section-label" id="catLabel">카테고리별 탐색</div>
      <div class="category-grid" id="catGrid"></div>
      <div class="term-panel" id="termPanel">
        <div class="term-panel-header">
          <div class="term-panel-title" id="termPanelTitle"></div>
          <div class="term-panel-close" onclick="closeCat()">×</div>
        </div>
        <div class="term-list" id="termList"></div>
      </div>
    </div>

    <!-- 로딩 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span id="loadingText">AI가 쉬운 말로 정리하는 중...</span>
    </div>

    <!-- 에러 -->
    <div class="error-box" id="errorBox"></div>

    <!-- 결과 -->
    <div class="result" id="result">

      <!-- 용어 설명 -->
      <div class="card">
        <div class="card-label" id="lbl1"></div>
        <div class="term-header">
          <div class="term-title" id="termTitle"></div>
          <div class="difficulty-badge" id="diffBadge"></div>
        </div>
        <div class="term-sub" id="termSub"></div>
        <div class="definition" id="definition"></div>
        <div class="analogy-box">
          <div class="analogy-label" id="analogyLabel"></div>
          <div class="analogy-text" id="analogy"></div>
        </div>
      </div>

      <!-- 실생활 사례 -->
      <div class="card">
        <div class="card-label" id="lbl2"></div>
        <div class="examples-grid" id="examplesGrid"></div>
      </div>

      <!-- 직군별 활용 -->
      <div class="card">
        <div class="card-label" id="lbl3"></div>
        <div class="job-grid" id="jobGrid"></div>
      </div>

      <!-- 온톨로지 그래프 -->
      <div class="card">
        <div class="card-label" id="lbl4"></div>
        <div id="graphContainer"><canvas id="graphCanvas"></canvas></div>
        <div class="graph-hint" id="graphHint"></div>
      </div>

      <!-- 혼동 개념 -->
      <div class="card" id="compareCard">
        <div class="card-label" id="lbl5"></div>
        <table class="compare-table" id="compareTable"></table>
      </div>

      <!-- 연관 용어 -->
      <div class="card">
        <div class="card-label" id="lbl6"></div>
        <div class="related-tags" id="relatedTags"></div>
      </div>

    </div>

    <!-- 히스토리 -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="section-label" id="historyLabel"></div>
      <div class="history-chips" id="historyChips"></div>
    </div>

  </div>
</div>

<script>
// ── 상태 ──────────────────────────────────────────────────
let lang = localStorage.getItem('lang') || 'ko';
let apiKey = localStorage.getItem('geminiKey') || '';
let activeCategory = null;

// ── 언어 설정 ─────────────────────────────────────────────
function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  applyLang();
}

function applyLang() {
  const t = T[lang];
  // 헤더
  const ht = document.getElementById('headerTitle');
  const hs = document.getElementById('headerSub');
  if (ht) ht.textContent = t.appTitle;
  if (hs) hs.textContent = t.appSub;
  // API 화면
  const at = document.getElementById('apiTitle');
  const as = document.getElementById('apiSub');
  const ast = document.getElementById('apiSteps');
  const an = document.getElementById('apiNote');
  const asb = document.getElementById('apiSaveBtn');
  if (at) at.textContent = t.apiTitle;
  if (as) as.textContent = t.apiSub;
  if (ast) ast.innerHTML = t.apiSteps;
  if (an) an.textContent = t.apiNote;
  if (asb) asb.textContent = t.apiSave;
  // 검색
  const inp = document.getElementById('termInput');
  const sb = document.getElementById('searchBtn');
  const rb = document.getElementById('resetBtn');
  const lt = document.getElementById('loadingText');
  if (inp) inp.placeholder = t.searchPlaceholder;
  if (sb) sb.textContent = t.searchBtn;
  if (rb) rb.textContent = t.apiReset;
  if (lt) lt.textContent = t.loading;
  // 레이블
  ['quickLabel','catLabel','historyLabel','lbl1','lbl2','lbl3','lbl4','lbl5','lbl6','analogyLabel','graphHint'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t[id.replace('lbl','lbl')] || t[id] || '';
  });
  // 언어 버튼 활성
  ['langKo','langEn','setupLangKo','setupLangEn'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const isKo = id.includes('Ko');
    el.classList.toggle('active', lang === (isKo ? 'ko' : 'en'));
    if (id.startsWith('setup')) {
      el.style.background = lang === (isKo ? 'ko' : 'en') ? 'var(--accent)' : 'var(--tag-bg)';
      el.style.color = lang === (isKo ? 'ko' : 'en') ? '#fff' : 'var(--ink-muted)';
    }
  });
  // 퀵칩 / 카테고리 재렌더
  renderQuickChips();
  renderCategories();
  // 히스토리 레이블
  renderHistory();
}

// ── API 키 관리 ───────────────────────────────────────────
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert(lang === 'ko' ? 'API 키를 입력해주세요.' : 'Please enter your API key.'); return; }
  apiKey = key;
  localStorage.setItem('geminiKey', key);
  showApp();
}

function resetApiKey() {
  if (!confirm(lang === 'ko' ? 'API 키를 초기화할까요?' : 'Reset your API key?')) return;
  localStorage.removeItem('geminiKey');
  apiKey = '';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('apiScreen').style.display = 'flex';
  document.getElementById('apiKeyInput').value = '';
}

function showApp() {
  document.getElementById('apiScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  applyLang();
}

function renderQuickChips() {

  container.innerHTML = '';
  T[lang].quickTerms.forEach(t => {

function renderCategories() {
  const grid = document.getElementById('catGrid');
  if (!grid) return;
  grid.innerHTML = '';
  T[lang].categories.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-card' + (activeCategory === cat.name ? ' active' : '');
    el.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div></div>`;

async function loadCategory(cat) {
  if (activeCategory === cat.name) { closeCat(); return; }
  activeCategory = cat.name;
  renderCategories();

  const panel = document.getElementById('termPanel');
  const list = document.getElementById('termList');
  const title = document.getElementById('termPanelTitle');

  title.textContent = `${cat.icon} ${cat.name}`;
  list.innerHTML = `<div style="font-size:13px;color:var(--ink-muted);display:flex;align-items:center;gap:8px;"><div class="spinner"></div>${T[lang].catTermsLoading}</div>`;
  panel.classList.add('visible');

  try {
    const prompt = lang === 'ko'
      ? `카테고리 "${cat.name}" (${cat.desc})에서 비IT 직장인이 알아두면 좋은 핵심 IT 용어 12개를 JSON으로만 반환하세요. 형식: {"terms":["용어1","용어2",...]} 마크다운 없이 순수 JSON만.`
      : `For the category "${cat.name}" (${cat.desc}), return 12 key IT terms that non-technical professionals should know. JSON only: {"terms":["term1","term2",...]} No markdown.`;

    const data = await callGemini(prompt);
    const parsed = JSON.parse(data.replace(/```json|```/g, '').trim());

    list.innerHTML = '';
    (parsed.terms || []).forEach(term => {
      const el = document.createElement('button');
      el.className = 'term-item';
      el.textContent = term;
      el.onclick = () => quickSearch(term);
      list.appendChild(el);
    });
  } catch {
    list.innerHTML = `<span style="font-size:13px;color:#B71C1C;">${T[lang].errorMsg}</span>`;
  }
}

// ── Gemini API 호출 ───────────────────────────────────────
async function callGemini(userMsg, systemInstruction) {
  const body = {
    contents: [{ role: 'user', parts: [{ text: userMsg }] }],
    generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
  };
  if (systemInstruction) {
    body.systemInstruction = { parts: [{ text: systemInstruction }] };
  }

  // AQ. 토큰이면 Bearer 방식, AIza면 API 키 방식
  const isBearer = apiKey.startsWith('AQ.');
  const url = isBearer
    ? 'https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-lite-latest:generateContent'
    : `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-lite-latest:generateContent?key=${apiKey}`;
  const headers = isBearer
    ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }
    : { 'Content-Type': 'application/json' };

  const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API error');
  }

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// ── 온톨로지 그래프 ───────────────────────────────────────
function drawGraph(center, ontology) {
  const canvas = document.getElementById('graphCanvas');
  const container = document.getElementById('graphContainer');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const nodes = ontology?.nodes || [];

  ctx.clearRect(0, 0, W, H);

  const positions = [{ x: cx, y: cy, label: ontology?.center || center, isCenter: true }];
  nodes.forEach((n, i) => {
    const angle = (i / nodes.length) * Math.PI * 2 - Math.PI / 2;
    const r = Math.min(W, H) * 0.33;
    positions.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, ...n });
  });
  currentGraphNodes = positions;

  // 엣지
  positions.slice(1).forEach(p => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = '#D8D4CC';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#AAA';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.relation || '', (cx + p.x) / 2, (cy + p.y) / 2 - 5);
  });

  // 노드
  positions.forEach(p => {
    const r = p.isCenter ? 42 : 32;
    const color = p.isCenter ? '#1C1C1C' : (p.color || '#2A54D4');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = p.isCenter ? '#1C1C1C' : color + '22';
    ctx.fill();
    if (!p.isCenter) { ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke(); }
    ctx.fillStyle = p.isCenter ? '#fff' : color;
    ctx.font = `${p.isCenter ? '700' : '500'} ${p.isCenter ? '13px' : '11px'} sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = p.label.length > 7 ? p.label.slice(0, 6) + '…' : p.label;
    ctx.fillText(label, p.x, p.y);
  });

  canvas.onclick = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    currentGraphNodes.slice(1).forEach(p => {
      if (Math.sqrt((mx - p.x) ** 2 + (my - p.y) ** 2) < 34) quickSearch(p.label);
    });
  };
}

// ── 히스토리 ──────────────────────────────────────────────
function addHistory(term) {
  searchHistory = [term, ...searchHistory.filter(t => t !== term)].slice(0, 8);
  localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const chips = document.getElementById('historyChips');
  const label = document.getElementById('historyLabel');
  if (!section || !chips) return;
  if (searchHistory.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  if (label) label.textContent = T[lang].historyLabel;
  chips.innerHTML = '';
  searchHistory.forEach(t => {
    const el = document.createElement('button');
    el.className = 'history-chip';
    el.textContent = t;
    el.onclick = () => quickSearch(t);
    chips.appendChild(el);
  });
}

// ── UI 유틸 ───────────────────────────────────────────────
function setLoading(v) {
  document.getElementById('loading').classList.toggle('visible', v);
  const sb = document.getElementById('searchBtn');
  if (sb) sb.disabled = v;
}

function showResult() { document.getElementById('result').classList.add('visible'); }
function hideResult() { document.getElementById('result').classList.remove('visible'); }

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}
</script>
